<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
    .logo-text {
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 700;
      font-size: 36px;
      fill: #374151;
    }
    .ai-dot {
      fill: #3868D9;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
  </style>
  
  <!-- AI脑波点阵 -->
  <circle class="ai-dot" cx="50" cy="40" r="4" />
  <circle class="ai-dot" cx="70" cy="30" r="3" style="animation-delay: 0.2s" />
  <circle class="ai-dot" cx="90" cy="50" r="3" style="animation-delay: 0.4s" />
  <circle class="ai-dot" cx="110" cy="35" r="4" style="animation-delay: 0.6s" />
  <circle class="ai-dot" cx="130" cy="45" r="3" style="animation-delay: 0.8s" />
  
  <!-- 连接线 -->
  <path d="M50,40 L70,30 L90,50 L110,35 L130,45" stroke="#93C5FD" stroke-width="1.5" fill="none" stroke-dasharray="4,2" />
  
  <!-- 简约LOGO文字 -->
  <text x="180" y="50" text-anchor="start" class="logo-text">STRATRONIX</text>
</svg>