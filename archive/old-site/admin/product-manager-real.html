<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Manager - Stratronix</title>
    <style>
        :root {
            --primary: #1a73e8;
            --secondary: #34a853;
            --danger: #ea4335;
            --light: #f8f9fa;
            --dark: #202124;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: var(--dark); padding: 20px; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 10px 10px 0 0; }
        .header h1 { display: flex; align-items: center; gap: 15px; }
        
        .content { background: white; padding: 30px; border-radius: 0 0 10px 10px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; margin: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        
        .form-container { background: var(--light); padding: 20px; border-radius: 10px; margin: 20px 0; display: none; }
        .form-container.active { display: block; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 15px; border: 1px solid #ddd; text-align: left; }
        th { background: var(--light); }
        
        .message { padding: 15px; border-radius: 5px; margin: 15px 0; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .actions { display: flex; gap: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Stratronix Product Manager</h1>
            <p>Manage your products directly on the website</p>
        </div>
        
        <div class="content">
            <div class="message" id="message"></div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Product Management</h2>
                <button class="btn btn-primary" id="addBtn">Add New Product</button>
            </div>
            
            <div class="form-container" id="productForm">
                <h3 id="formTitle">Add New Product</h3>
                <form id="productFormElement">
                    <input type="hidden" id="productId">
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group">
                            <label>Product Name *</label>
                            <input type="text" id="productName" required>
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <select id="productCategory" required>
                                <option value="">Select</option>
                                <option value="photography">Photography</option>
                                <option value="audio">Audio</option>
                                <option value="video">Video</option>
                                <option value="lighting">Lighting</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Price ($) *</label>
                            <input type="number" id="productPrice" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Stock *</label>
                            <input type="number" id="productStock" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDescription" rows="3"></textarea>
                    </div>
                    
                    <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
                        <button type="button" class="btn" id="cancelBtn">Cancel</button>
                        <button type="submit" class="btn btn-success">Save Product</button>
                    </div>
                </form>
            </div>
            
            <table id="productsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr><td colspan="5" style="text-align: center; padding: 30px; color: #666;">No products yet. Click "Add New Product" to add your first product.</td></tr>
                </tbody>
            </table>
            
            <div style="margin-top: 40px; padding: 20px; background: var(--light); border-radius: 10px;">
                <h3>📝 Website Content Editor</h3>
                <div class="form-group">
                    <label>Website Title</label>
                    <input type="text" id="websiteTitle" value="Stratronix">
                </div>
                <div class="form-group">
                    <label>Website Description</label>
                    <textarea id="websiteDescription" rows="3">Professional photography and audio solutions</textarea>
                </div>
                <button class="btn btn-primary" id="saveContentBtn">Save Website Content</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Product Manager loaded');
            
            const STORAGE_KEY = 'stratronix_products';
            let editingProductId = null;
            
            // Initialize
            loadProducts();
            loadWebsiteContent();
            
            // Event listeners
            document.getElementById('addBtn').addEventListener('click', showForm);
            document.getElementById('cancelBtn').addEventListener('click', cancelForm);
            document.getElementById('productFormElement').addEventListener('submit', saveProduct);
            document.getElementById('saveContentBtn').addEventListener('click', saveWebsiteContent);
            
            function showMessage(text, type = 'success') {
                const el = document.getElementById('message');
                el.textContent = text;
                el.className = `message ${type}`;
                el.style.display = 'block';
                
                setTimeout(() => {
                    el.style.display = 'none';
                }, 3000);
            }
            
            function showForm() {
                document.getElementById('productForm').classList.add('active');
                document.getElementById('addBtn').style.display = 'none';
                document.getElementById('productName').focus();
            }
            
            function cancelForm() {
                document.getElementById('productForm').classList.remove('active');
                document.getElementById('addBtn').style.display = 'block';
                document.getElementById('productFormElement').reset();
                document.getElementById('productId').value = '';
                document.getElementById('formTitle').textContent = 'Add New Product';
                editingProductId = null;
            }
            
            function loadProducts() {
                try {
                    const products = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    const tbody = document.getElementById('productsTableBody');
                    
                    if (products.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px; color: #666;">No products yet. Click "Add New Product" to add your first product.</td></tr>';
                        return;
                    }
                    
                    let html = '';
                    products.forEach(product => {
                        const status = product.stock > 0 ? 'In Stock' : 'Out of Stock';
                        const statusColor = product.stock > 0 ? '#34a853' : '#ea4335';
                        
                        html += `
                            <tr data-id="${product.id}">
                                <td><strong>${product.name}</strong></td>
                                <td>${product.category}</td>
                                <td>$${product.price.toFixed(2)}</td>
                                <td><span style="color: ${statusColor}">${product.stock} (${status})</span></td>
                                <td class="actions">
                                    <button class="btn btn-primary" onclick="editProduct('${product.id}')">Edit</button>
                                    <button class="btn btn-danger" onclick="deleteProduct('${product.id}')">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                    
                    tbody.innerHTML = html;
                } catch (error) {
                    console.error('Error loading products:', error);
                    showMessage('Error loading products', 'error');
                }
            }
            
            window.editProduct = function(productId) {
                try {
                    const products = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    const product = products.find(p => p.id === productId);
                    
                    if (!product) {
                        showMessage('Product not found', 'error');
                        return;
                    }
                    
                    editingProductId = productId;
                    
                    document.getElementById('productId').value = product.id;
                    document.getElementById('productName').value = product.name;
                    document.getElementById('productCategory').value = product.category;
                    document.getElementById('productPrice').value = product.price;
                    document.getElementById('productStock').value = product.stock;
                    document.getElementById('productDescription').value = product.description || '';
                    
                    document.getElementById('formTitle').textContent = 'Edit Product';
                    showForm();
                } catch (error) {
                    console.error('Error editing product:', error);
                    showMessage('Error editing product', 'error');
                }
            };
            
            window.deleteProduct = function(productId) {
                if (!confirm('Are you sure you want to delete this product?')) {
                    return;
                }
                
                try {
                    let products = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    products = products.filter(p => p.id !== productId);
                    
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
                    loadProducts();
                    showMessage('Product deleted successfully');
                } catch (error) {
                    console.error('Error deleting product:', error);
                    showMessage('Error deleting product', 'error');
                }
            };
            
            function saveProduct(e) {
                e.preventDefault();
                
                try {
                    const product = {
                        id: editingProductId || Date.now().toString(),
                        name: document.getElementById('productName').value.trim(),
                        category: document.getElementById('productCategory').value,
                        price: parseFloat(document.getElementById('productPrice').value) || 0,
                        stock: parseInt(document.getElementById('productStock').value) || 0,
                        description: document.getElementById('productDescription').value.trim(),
                        createdAt: editingProductId ? undefined : new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    
                    // Validation
                    if (!product.name || !product.category || product.price <= 0) {
                        showMessage('Please fill in all required fields correctly', 'error');
                        return;
                    }
                    
                    let products = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    
                    if (editingProductId) {
                        // Update existing product
                        const index = products.findIndex(p => p.id === editingProductId);
                        if (index !== -1) {
                            products[index] = { ...products[index], ...product };
                            showMessage('Product updated successfully');
                        }
                    } else {
                        // Add new product
                        products.push(product);
                        showMessage('Product added successfully');
                    }
                    
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
                    loadProducts();
                    cancelForm();
                } catch (error) {
                    console.error('Error saving product:', error);
                    showMessage('Error saving product', 'error');
                }
            }
            
            function loadWebsiteContent() {
                try {
                    const title = localStorage.getItem('stratronix_website_title') || 'Stratronix';
                    const description = localStorage.getItem('stratronix_website_description') || 'Professional photography and audio solutions';
                    
                    document.getElementById('websiteTitle').value = title;
                    document.getElementById('websiteDescription').value = description;
                } catch (error) {
                    console.error('Error loading website content:', error);
                }
            }
            
            function saveWebsiteContent() {
                try {
                    const title = document.getElementById('websiteTitle').value;
                    const description = document.getElementById('websiteDescription').value;
                    
                    localStorage.setItem('stratronix_website_title', title);
                    localStorage.setItem('stratronix_website_description', description);
                    
                    showMessage('Website content saved successfully');
                } catch (error) {
                    console.error('Error saving website content:', error);
                    showMessage('Error saving website content', 'error');
                }
            }
        });
    </script>
</body>
</html>
