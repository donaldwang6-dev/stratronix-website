<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Current State Check</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 5px solid #ccc;
        }
        .success {
            border-color: #4CAF50;
            background: #f0f9f0;
        }
        .warning {
            border-color: #ff9800;
            background: #fff3e0;
        }
        .error {
            border-color: #f44336;
            background: #ffebee;
        }
        .check-item {
            margin: 5px 0;
            padding: 5px;
        }
        code {
            background: #f5f5f5;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Stratronix网站状态检查</h1>
    <p>检查时间: <span id="check-time"></span></p>
    
    <div class="test-result" id="result1">
        <h3>1. 首页USE CASES检查</h3>
        <div class="check-item">状态: <span id="usecases-status">检查中...</span></div>
        <div class="check-item" id="usecases-detail"></div>
    </div>
    
    <div class="test-result" id="result2">
        <h3>2. QUICK LINKS颜色检查</h3>
        <div class="check-item">状态: <span id="quicklinks-status">检查中...</span></div>
        <div class="check-item" id="quicklinks-detail"></div>
    </div>
    
    <div class="test-result" id="result3">
        <h3>3. 导航样式检查</h3>
        <div class="check-item">状态: <span id="nav-status">检查中...</span></div>
        <div class="check-item" id="nav-detail"></div>
    </div>
    
    <div class="test-result" id="result4">
        <h3>4. CORE VALUE布局检查</h3>
        <div class="check-item">状态: <span id="corevalue-status">检查中...</span></div>
        <div class="check-item" id="corevalue-detail"></div>
    </div>
    
    <div class="test-result" id="result5">
        <h3>5. A100图片检查</h3>
        <div class="check-item">状态: <span id="a100-status">检查中...</span></div>
        <div class="check-item" id="a100-detail"></div>
    </div>
    
    <div style="margin-top: 30px;">
        <h3>建议操作:</h3>
        <ul>
            <li>如果检查失败，等待Vercel部署完成（通常需要5-15分钟）</li>
            <li>使用无痕模式访问避免浏览器缓存</li>
            <li>在URL后添加 <code>?v=2</code> 强制刷新缓存</li>
            <li>检查Vercel部署状态</li>
        </ul>
    </div>
    
    <script>
        document.getElementById('check-time').textContent = new Date().toLocaleString();
        
        // 检查首页USE CASES
        fetch('https://www.stratronix.ai/en/index.html?' + Date.now())
            .then(response => response.text())
            .then(html => {
                const hasUseCases = html.includes('Industry Use Cases');
                const result1 = document.getElementById('result1');
                const status1 = document.getElementById('usecases-status');
                const detail1 = document.getElementById('usecases-detail');
                
                if (hasUseCases) {
                    result1.className = 'test-result error';
                    status1.textContent = '❌ 仍然存在USE CASES';
                    detail1.textContent = '首页仍然包含"Industry Use Cases"，需要等待部署完成';
                } else {
                    result1.className = 'test-result success';
                    status1.textContent = '✅ USE CASES已移除';
                    detail1.textContent = '首页已成功移除USE CASES部分';
                }
            })
            .catch(error => {
                document.getElementById('result1').className = 'test-result warning';
                document.getElementById('usecases-status').textContent = '⚠️ 检查失败';
                document.getElementById('usecases-detail').textContent = '无法访问首页: ' + error.message;
            });
        
        // 检查QUICK LINKS颜色
        fetch('https://www.stratronix.ai/css/style.css?' + Date.now())
            .then(response => response.text())
            .then(css => {
                const footerLinksMatch = css.match(/\.footer-links a\s*{[^}]*}/);
                const result2 = document.getElementById('result2');
                const status2 = document.getElementById('quicklinks-status');
                const detail2 = document.getElementById('quicklinks-detail');
                
                if (footerLinksMatch) {
                    const footerLinksCss = footerLinksMatch[0];
                    const isWhite = footerLinksCss.includes('color: var(--text-light)') || 
                                   footerLinksCss.includes('color: #ffffff') ||
                                   footerLinksCss.includes('color: white');
                    
                    if (isWhite) {
                        result2.className = 'test-result success';
                        status2.textContent = '✅ QUICK LINKS为白色';
                        detail2.textContent = 'CSS已更新为白色字体';
                    } else {
                        result2.className = 'test-result error';
                        status2.textContent = '❌ QUICK LINKS不是白色';
                        detail2.textContent = 'CSS显示为: ' + (footerLinksCss.match(/color:\s*([^;]+)/) || ['', '未知'])[1];
                    }
                } else {
                    result2.className = 'test-result warning';
                    status2.textContent = '⚠️ 未找到样式';
                    detail2.textContent = '无法找到.footer-links a样式';
                }
            })
            .catch(error => {
                document.getElementById('result2').className = 'test-result warning';
                document.getElementById('quicklinks-status').textContent = '⚠️ 检查失败';
                document.getElementById('quicklinks-detail').textContent = '无法访问CSS: ' + error.message;
            });
        
        // 检查导航样式
        fetch('https://www.stratronix.ai/css/style.css?' + Date.now())
            .then(response => response.text())
            .then(css => {
                const navLinkMatch = css.match(/\.nav-link\s*{[^}]*}/);
                const result3 = document.getElementById('result3');
                const status3 = document.getElementById('nav-status');
                const detail3 = document.getElementById('nav-detail');
                
                if (navLinkMatch) {
                    const navLinkCss = navLinkMatch[0];
                    const isBlack = navLinkCss.includes('color: #000000');
                    const hasLargeFont = navLinkCss.includes('font-size: 1.1rem');
                    
                    if (isBlack && hasLargeFont) {
                        result3.className = 'test-result success';
                        status3.textContent = '✅ 导航样式正确';
                        detail3.textContent = '黑色 + 1.1rem字体';
                    } else {
                        result3.className = 'test-result warning';
                        status3.textContent = '⚠️ 导航样式不完整';
                        detail3.textContent = '颜色: ' + (isBlack ? '黑色' : '非黑色') + 
                                            ', 字体大小: ' + (hasLargeFont ? '1.1rem' : '非1.1rem');
                    }
                } else {
                    result3.className = 'test-result warning';
                    status3.textContent = '⚠️ 未找到样式';
                    detail3.textContent = '无法找到.nav-link样式';
                }
            })
            .catch(error => {
                document.getElementById('result3').className = 'test-result warning';
                document.getElementById('nav-status').textContent = '⚠️ 检查失败';
                document.getElementById('nav-detail').textContent = '无法访问CSS: ' + error.message;
            });
        
        // 简单检查其他项目
        setTimeout(() => {
            document.getElementById('corevalue-status').textContent = '⏳ 需要手动检查';
            document.getElementById('corevalue-detail').textContent = '请访问首页查看CORE VALUE布局';
            
            document.getElementById('a100-status').textContent = '⏳ 需要手动检查';
            document.getElementById('a100-detail').textContent = '请访问首页查看A100图片';
        }, 1000);
    </script>
</body>
</html>
