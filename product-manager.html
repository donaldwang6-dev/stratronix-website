<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Manager - Stratronix</title>
    <style>
        :root {
            --primary: #1a73e8;
            --secondary: #34a853;
            --danger: #ea4335;
            --light: #f8f9fa;
            --dark: #202124;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #0d47a1 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            margin: 0;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .content {
            padding: 30px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 5px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-secondary {
            background: var(--light);
            color: var(--dark);
            border: 1px solid #ddd;
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .form-container {
            background: var(--light);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: none;
        }
        
        .form-container.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        th, td {
            padding: 15px;
            border: 1px solid #ddd;
            text-align: left;
        }
        
        th {
            background: var(--light);
        }
        
        .message {
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-boxes"></i> Product Management</h1>
            <p>Real product management with data persistence</p>
        </div>
        
        <div class="content">
            <div class="message" id="message"></div>
            
            <button class="btn btn-primary" id="addBtn">
                <i class="fas fa-plus"></i> Add New Product
            </button>
            <button class="btn btn-secondary" onclick="exportData()">
                <i class="fas fa-download"></i> Export Data
            </button>
            <button class="btn btn-secondary" onclick="importData()">
                <i class="fas fa-upload"></i> Import Data
            </button>
            
            <div class="form-container" id="productForm">
                <h3><i class="fas fa-edit"></i> Product Form</h3>
                <form onsubmit="saveProduct(event)">
                    <input type="hidden" id="productId">
                    
                    <div class="form-group">
                        <label>Product Name *</label>
                        <input type="text" id="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="category" required>
                            <option value="">Select</option>
                            <option value="photography">Photography</option>
                            <option value="audio">Audio</option>
                            <option value="video">Video</option>
                            <option value="lighting">Lighting</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Price ($) *</label>
                        <input type="number" id="price" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Stock Quantity *</label>
                        <input type="number" id="stock" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" rows="3"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Save Product</button>
                    <button type="button" class="btn btn-secondary" onclick="cancelForm()">Cancel</button>
                </form>
            </div>
            
            <h3><i class="fas fa-list"></i> Product List</h3>
            <table id="productTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <!-- Products will be loaded here -->
                </tbody>
            </table>
            
            <div style="margin-top: 30px; padding: 20px; background: var(--light); border-radius: 10px;">
                <h4><i class="fas fa-info-circle"></i> System Info</h4>
                <p>Products Count: <span id="productsCount">0</span></p>
                <p>Data Storage: LocalStorage (persists across sessions)</p>
                <p>Last Updated: <span id="lastUpdated">-</span></p>
            </div>
        </div>
    </div>

    <script>
        // Font Awesome icons (fallback if CDN fails)
        const style = document.createElement('style');
        style.textContent = `
            .fas, .fa { font-family: 'Font Awesome 6 Free'; font-weight: 900; }
            .fa-boxes:before { content: "\\f468"; }
            .fa-plus:before { content: "\\2b"; }
            .fa-download:before { content: "\\f019"; }
            .fa-upload:before { content: "\\f093"; }
            .fa-edit:before { content: "\\f044"; }
            .fa-list:before { content: "\\f03a"; }
            .fa-info-circle:before { content: "\\f05a"; }
            .fa-trash:before { content: "\\f1f8"; }
        `;
        document.head.appendChild(style);
        
        // Product Management System
        const STORAGE_KEY = 'stratronix_products_data';
        let products = [];
        let editingId = null;
        
        // Initialize
        function init() {
            loadProducts();
            renderProducts();
            updateInfo();
            
            document.getElementById('addBtn').addEventListener('click', showForm);
            
            showMessage('Product Management System Ready', 'success');
        }
        
        // Load products from LocalStorage
        function loadProducts() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                products = data ? JSON.parse(data) : [];
                console.log(`Loaded ${products.length} products`);
            } catch (error) {
                console.error('Error loading products:', error);
                products = [];
            }
        }
        
        // Save products to LocalStorage
        function saveProducts() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
                updateInfo();
                return true;
            } catch (error) {
                console.error('Error saving products:', error);
                showMessage('Error saving data', 'error');
                return false;
            }
        }
        
        // Show message
        function showMessage(text, type = 'info') {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `message ${type}`;
            el.style.display = 'block';
            
            setTimeout(() => {
                el.style.display = 'none';
            }, 3000);
        }
        
        // Show form
        function showForm() {
            document.getElementById('productForm').classList.add('active');
            document.getElementById('addBtn').style.display = 'none';
            document.getElementById('name').focus();
        }
        
        // Cancel form
        function cancelForm() {
            document.getElementById('productForm').classList.remove('active');
            document.getElementById('addBtn').style.display = 'inline-flex';
            resetForm();
        }
        
        // Reset form
        function resetForm() {
            document.getElementById('productForm').querySelector('form').reset();
            document.getElementById('productId').value = '';
            editingId = null;
        }
        
        // Save product
        function saveProduct(e) {
            e.preventDefault();
            
            const product = {
                id: editingId || Date.now().toString(),
                name: document.getElementById('name').value.trim(),
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value) || 0,
                stock: parseInt(document.getElementById('stock').value) || 0,
                description: document.getElementById('description').value.trim(),
                createdAt: editingId ? undefined : new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            // Validation
            if (!product.name || !product.category || product.price <= 0) {
                showMessage('Please fill in all required fields correctly', 'error');
                return;
            }
            
            if (editingId) {
                // Update existing product
                const index = products.findIndex(p => p.id === editingId);
                if (index !== -1) {
                    products[index] = { ...products[index], ...product };
                    showMessage('Product updated successfully', 'success');
                }
            } else {
                // Add new product
                products.push(product);
                showMessage('Product added successfully', 'success');
            }
            
            // Save to LocalStorage
            if (saveProducts()) {
                renderProducts();
                cancelForm();
            }
        }
        
        // Edit product
        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            editingId = id;
            document.getElementById('productId').value = id;
            document.getElementById('name').value = product.name;
            document.getElementById('category').value = product.category;
            document.getElementById('price').value = product.price;
            document.getElementById('stock').value = product.stock;
            document.getElementById('description').value = product.description || '';
            
            showForm();
        }
        
        // Delete product
        function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) {
                return;
            }
            
            products = products.filter(p => p.id !== id);
            if (saveProducts()) {
                renderProducts();
                showMessage('Product deleted', 'success');
            }
        }
        
        // Render product list
        function renderProducts() {
            const tbody = document.getElementById('productTableBody');
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px; color: #666;">No products yet. Click "Add New Product" to add your first product.</td></tr>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                const status = product.stock > 0 ? 'In Stock' : 'Out of Stock';
                const statusColor = product.stock > 0 ? '#34a853' : '#ea4335';
                
                html += `
                    <tr>
                        <td><strong>${product.name}</strong></td>
                        <td>${product.category}</td>
                        <td>$${product.price.toFixed(2)}</td>
                        <td><span style="color: ${statusColor}">${product.stock} (${status})</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="editProduct('${product.id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProduct('${product.id}')">Delete</button>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // Export data
        function exportData() {
            const dataStr = JSON.stringify(products, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', `products-${new Date().toISOString().split('T')[0]}.json`);
            link.click();
            
            showMessage('Data exported successfully', 'success');
        }
        
        // Import data
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (Array.isArray(imported)) {
                            // Merge without duplicates
                            const existingIds = new Set(products.map(p => p.id));
                            imported.forEach(product => {
                                if (!existingIds.has(product.id)) {
                                    products.push(product);
                                }
                            });
                            
                            if (saveProducts()) {
                                renderProducts();
                                showMessage(`Imported ${imported.length} products`, 'success');
                            }
                        }
                    } catch (error) {
                        showMessage('Error parsing JSON file', 'error');
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }
        
        // Update system info
        function updateInfo() {
            document.getElementById('productsCount').textContent = products.length;
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
        }
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
