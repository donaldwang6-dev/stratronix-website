<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratronix A100 - Professional AI-Agent Appliance Technical Specifications</title>
    <style>
        /* ====== 专业企业级设计 ====== */
        :root {
            --primary-blue: #1a73e8;
            --primary-dark: #0d47a1;
            --accent-green: #34a853;
            --neutral-dark: #202124;
            --neutral-gray: #5f6368;
            --neutral-light: #f8f9fa;
            --gradient-primary: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
            --gradient-accent: linear-gradient(90deg, var(--primary-blue), var(--accent-green));
            --shadow-large: 0 20px 60px rgba(0, 0, 0, 0.15);
            --shadow-medium: 0 10px 30px rgba(0, 0, 0, 0.1);
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--neutral-light);
            color: var(--neutral-dark);
            line-height: 1.6;
            padding: 40px;
            min-height: 100vh;
        }

        /* ====== 文档容器 ====== */
        .document-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            padding: 60px;
            box-shadow: var(--shadow-large);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        /* ====== 专业头部 ====== */
        .document-header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 2px solid rgba(26, 115, 232, 0.15);
        }

        .company-branding {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .company-logo {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .company-tagline {
            font-size: 1.2rem;
            color: var(--neutral-gray);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .product-title-section {
            margin: 40px 0;
        }

        .product-main-title {
            font-size: 3.8rem;
            font-weight: 900;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .product-subtitle {
            font-size: 1.8rem;
            color: var(--neutral-gray);
            font-weight: 400;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .document-meta {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            color: var(--neutral-gray);
            font-size: 1.1rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .meta-icon {
            color: var(--primary-blue);
            font-size: 1.2rem;
        }

        /* ====== 产品展示区域 ====== */
        .product-showcase {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            margin: 60px 0;
            align-items: center;
        }

        .product-visual {
            text-align: center;
        }

        .product-image-container {
            position: relative;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow-medium);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .product-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .product-image:hover {
            transform: scale(1.02);
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            color: white;
            padding: 20px;
            text-align: left;
        }

        .product-highlights {
            padding: 30px;
        }

        .highlight-title {
            font-size: 2.2rem;
            color: var(--neutral-dark);
            margin-bottom: 30px;
            font-weight: 700;
        }

        .highlight-list {
            list-style: none;
        }

        .highlight-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .highlight-icon {
            color: var(--primary-blue);
            font-size: 1.5rem;
            flex-shrink: 0;
            margin-top: 3px;
        }

        .highlight-content h4 {
            font-size: 1.3rem;
            color: var(--neutral-dark);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .highlight-content p {
            color: var(--neutral-gray);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        /* ====== 核心规格网格 ====== */
        .core-specifications {
            margin: 80px 0;
        }

        .section-title {
            font-size: 2.5rem;
            color: var(--neutral-dark);
            text-align: center;
            margin-bottom: 50px;
            font-weight: 800;
            position: relative;
            padding-bottom: 20px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .spec-category {
            background: white;
            border-radius: var(--border-radius);
            padding: 35px;
            box-shadow: var(--shadow-medium);
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .spec-category:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.15);
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(26, 115, 232, 0.1);
        }

        .category-icon {
            color: var(--primary-blue);
            font-size: 2rem;
        }

        .category-title {
            font-size: 1.8rem;
            color: var(--neutral-dark);
            font-weight: 700;
        }

        .spec-list {
            list-style: none;
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .spec-item:last-child {
            border-bottom: none;
        }

        .spec-label {
            font-size: 1.1rem;
            color: var(--neutral-gray);
            font-weight: 500;
        }

        .spec-value {
            font-size: 1.2rem;
            color: var(--neutral-dark);
            font-weight: 700;
            text-align: right;
        }

        .spec-note {
            font-size: 0.95rem;
            color: var(--neutral-gray);
            font-style: italic;
            margin-top: 5px;
        }

        /* ====== 详细技术规格表 ====== */
        .technical-details {
            margin: 80px 0;
        }

        .tech-table-container {
            overflow-x: auto;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-medium);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .tech-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .tech-table thead {
            background: var(--gradient-primary);
        }

        .tech-table th {
            color: white;
            font-weight: 600;
            text-align: left;
            padding: 20px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tech-table tbody tr {
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            transition: background-color 0.2s ease;
        }

        .tech-table tbody tr:hover {
            background-color: rgba(26, 115, 232, 0.03);
        }

        .tech-table tbody tr:nth-child(even) {
            background-color: rgba(0, 0, 0, 0.02);
        }

        .tech-table tbody tr:nth-child(even):hover {
            background-color: rgba(26, 115, 232, 0.05);
        }

        .tech-table td {
            padding: 18px 20px;
            color: var(--neutral-dark);
            font-size: 1.05rem;
        }

        .tech-table td:first-child {
            font-weight: 600;
            color: var(--neutral-dark);
            width: 30%;
        }

        .tech-table td:nth-child(2) {
            color: var(--neutral-gray);
            width: 25%;
        }

        .tech-table td:nth-child(3) {
            color: var(--neutral-dark);
            font-weight: 500;
            width: 45%;
        }

        /* ====== 应用场景 ====== */
        .use-cases {
            margin: 80px 0;
        }

        .use-case-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .use-case-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 35px;
            box-shadow: var(--shadow-medium);
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .use-case-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.15);
            border-color: var(--primary-blue);
        }

        .use-case-icon {
            color: var(--primary-blue);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .use-case-title {
            font-size: 1.6rem;
            color: var(--neutral-dark);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .use-case-description {
            color: var(--neutral-gray);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .use-case-benefits {
            list-style: none;
            margin-top: 20px;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: var(--neutral-gray);
            font-size: 0.95rem;
        }

        .benefit-icon {
            color: var(--accent-green);
            font-size: 0.9rem;
        }

        /* ====== 页脚和CTA ====== */
        .document-footer {
            margin-top: 80px;
            padding-top: 50px;
            border-top: 2px solid rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .cta-section {
            background: var(--gradient-primary);
            border-radius: var(--border-radius);
            padding: 50px;
            color: white;
            margin-bottom: 40px;
        }

        .cta-title {
            font-size: 2.2rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .cta-description {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto 30px;
            line-height: 1.8;
        }

        .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: white;
            color: var(--primary-blue);
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .footer-info {
            color: var(--neutral-gray);
            font-size: 1rem;
            line-height: 1.8;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .footer-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .footer-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* ====== 响应式设计 ====== */
        @media (max-width: 992px) {
            .product-showcase {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            
            .document-container {
                padding: 40px;
            }
            
            .product-main-title {
                font-size: 3rem;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            
            .document-container {
                padding: 30px;
            }
            
            .product-main-title {
                font-size: 2.5rem;
            }
            
            .section-title {
                font-size: 2rem;
            }
            
            .spec-grid {
                grid-template-columns: 1fr;
            }
            
            .cta-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* ====== 打印样式 ====== */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .document-container {
                box-shadow: none;
                border: none;
                padding: 20px;
            }
            
            .btn {
                display: none;
            }
            
            .tech-table-container {
                box-shadow: none;
                border: 1px solid #ddd;
            }
            
            .spec-category, .use-case-card {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
